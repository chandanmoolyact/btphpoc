_schema-version: "3.2"
ID: btphpoc
version: 0.0.1
modules:
- name: btphpoc-destination-content
  type: com.sap.application.content
  requires:
  - name: btphpoc-destination-service
    parameters:
      content-target: true
  - name: btphpoc_html_repo_host
    parameters:
      service-key:
        name: btphpoc_html_repo_host-key
  - name: uaa_btphpoc
    parameters:
      service-key:
        name: uaa_btphpoc-key
  parameters:
    content:
      instance:
        destinations:
        - Name: btphpoc_btphpoc_html_repo_host
          ServiceInstanceName: btphpoc-html5-app-host-service
          ServiceKeyName: btphpoc_html_repo_host-key
          sap.cloud.service: btphpoc
        - Authentication: OAuth2UserTokenExchange
          Name: btphpoc_uaa_btphpoc
          ServiceInstanceName: btphpoc-xsuaa-service
          ServiceKeyName: uaa_btphpoc-key
          sap.cloud.service: btphpoc
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: btphpoc-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: btphpoc_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comsappoexcel.zip
      name: comsappoexcel
      target-path: resources/
- name: comsappoexcel
  type: html5
  path: poexcel
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: btphpoc-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: btphpoc-destination-service
    service-plan: lite
- name: btphpoc_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: btphpoc-html5-app-host-service
    service-plan: app-host
- name: uaa_btphpoc
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: btphpoc-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
